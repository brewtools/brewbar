<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create Instagram-ready menu images for your cafe's coffee bean offerings" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval';">
    <meta name="theme-color" content="#FFFCF0" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Brewbar - Cafe Menu Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Playfair+Display:wght@400;600;700&family=Orbitron:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #FFFCF0;
        --fg: #100F0F;
        --paper: #F2F0E5;
        --muted: #878580;
        --accent: #D14D41;
        --accent-fg: #FFFCF0;
        --border: #E8E6E1;
      }
      .dark {
        --bg: #100F0F;
        --fg: #B7B5AA;
        --paper: #1C1C1C;
        --muted: #9A9890;
        --accent: #A63C33;
        --accent-fg: #D8D6CC;
        --border: #2A2A2A;
      }
    </style>
    <script>
      // Set initial theme-color based on system preference
      (function() {
        const meta = document.getElementById('theme-color-meta');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (meta) {
          meta.content = prefersDark ? '#100F0F' : '#FFFCF0';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
